<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon SP ROAS 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white; padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    header h1 span { color: #f7b731; }
    .badge { background: #2ecc71; color: white; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .badge.sample { background: #f39c12; }

    .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

    /* KPI 카드 */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .kpi-card {
      background: white; border-radius: 12px; padding: 22px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      border-left: 4px solid transparent;
    }
    .kpi-card.green  { border-left-color: #2ecc71; }
    .kpi-card.orange { border-left-color: #f39c12; }
    .kpi-card.blue   { border-left-color: #3498db; }
    .kpi-card.red    { border-left-color: #e74c3c; }
    .kpi-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
    .kpi-value { font-size: 32px; font-weight: 700; line-height: 1; }
    .kpi-sub   { font-size: 12px; color: #888; margin-top: 6px; }
    .kpi-bar   { height: 4px; background: #f0f0f0; border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .kpi-bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }

    /* 탭 */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid #e8e8e8; }
    .tab {
      padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500;
      color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all .2s;
    }
    .tab.active { color: #1a1a2e; border-bottom-color: #f7b731; }
    .tab:hover:not(.active) { color: #333; }

    /* 패널 */
    .panel { display: none; }
    .panel.active { display: block; }

    /* 테이블 */
    .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); overflow: hidden; }
    .card-header { padding: 18px 24px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .card-header h2 { font-size: 15px; font-weight: 600; }
    .card-header .count { font-size: 13px; color: #888; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #fafafa; padding: 10px 16px; text-align: left; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    td { padding: 11px 16px; border-top: 1px solid #f5f5f5; }
    tr:hover td { background: #fafbfc; }

    /* 액션 배지 */
    .action-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    }
    .action-badge.bid_increase       { background: #e8f5e9; color: #2e7d32; }
    .action-badge.bid_decrease       { background: #fff3e0; color: #e65100; }
    .action-badge.negative_candidate { background: #fce4ec; color: #c62828; }
    .action-badge.harvest_to_exact   { background: #e3f2fd; color: #1565c0; }
    .action-badge.maintain           { background: #f5f5f5; color: #555; }
    .action-badge.insufficient_data  { background: #f3e5f5; color: #6a1b9a; }

    /* 캠페인 상태 */
    .status-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
    .status-badge.achieved        { background: #e8f5e9; color: #2e7d32; }
    .status-badge.close           { background: #fff3e0; color: #e65100; }
    .status-badge.underperforming { background: #fce4ec; color: #c62828; }

    /* ROAS 게이지 */
    .roas-bar { display: flex; align-items: center; gap: 8px; }
    .roas-track { flex: 1; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .roas-fill  { height: 100%; border-radius: 3px; }

    /* 숫자 */
    .num-positive { color: #2e7d32; font-weight: 600; }
    .num-negative { color: #c62828; font-weight: 600; }

    /* 필터바 */
    .filter-bar { display: flex; gap: 8px; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px; border-radius: 20px; border: 1px solid #e0e0e0;
      background: white; font-size: 12px; cursor: pointer; transition: all .2s;
    }
    .filter-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }

    /* 차트 영역 */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-card { background: white; border-radius: 12px; padding: 22px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #333; }

    /* 로딩 */
    .loading { text-align: center; padding: 60px; color: #888; font-size: 14px; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #eee; border-top-color: #f7b731; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { background: #fff5f5; border: 1px solid #fcc; border-radius: 8px; padding: 20px; color: #c62828; font-size: 13px; }
    .error-box code { background: #fee; padding: 2px 6px; border-radius: 3px; font-family: monospace; }

    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Amazon SP · <span>ROAS</span> 최적화 대시보드</h1>
  <span id="data-badge" class="badge sample">⏳ 로딩 중</span>
</header>

<div class="container">
  <!-- KPI 카드 -->
  <div class="kpi-grid" id="kpi-grid">
    <div class="loading" style="grid-column:1/-1">
      <div class="spinner"></div><br>데이터 불러오는 중…
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('campaigns')">📊 캠페인 성과</div>
    <div class="tab" onclick="switchTab('actions')">⚙️ 최적화 액션</div>
    <div class="tab" onclick="switchTab('harvest')">🌾 Exact 수확 후보</div>
  </div>

  <!-- 캠페인 패널 -->
  <div class="panel active" id="panel-campaigns">
    <div class="chart-grid">
      <div class="chart-card"><h3>캠페인별 ROAS</h3><canvas id="chart-roas"></canvas></div>
      <div class="chart-card"><h3>캠페인별 광고비 vs 매출</h3><canvas id="chart-spend"></canvas></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>캠페인 성과 상세</h2><span class="count" id="camp-count"></span></div>
      <table>
        <thead><tr>
          <th>캠페인</th><th>광고비</th><th>매출</th><th>주문</th>
          <th>ROAS</th><th>ACoS</th><th>상태</th>
        </tr></thead>
        <tbody id="tb-campaigns"></tbody>
      </table>
    </div>
  </div>

  <!-- 액션 패널 -->
  <div class="panel" id="panel-actions">
    <div class="card">
      <div class="filter-bar" id="action-filters">
        <button class="filter-btn active" onclick="filterActions('all', this)">전체</button>
        <button class="filter-btn" onclick="filterActions('bid_increase', this)">📈 입찰 인상</button>
        <button class="filter-btn" onclick="filterActions('bid_decrease', this)">📉 입찰 인하</button>
        <button class="filter-btn" onclick="filterActions('negative_candidate', this)">🚫 네거티브</button>
        <button class="filter-btn" onclick="filterActions('harvest_to_exact', this)">🌾 수확</button>
        <button class="filter-btn" onclick="filterActions('maintain', this)">✅ 유지</button>
      </div>
      <div class="card-header"><h2>최적화 액션 목록</h2><span class="count" id="action-count"></span></div>
      <table>
        <thead><tr>
          <th>검색어</th><th>캠페인</th><th>매치</th><th>클릭</th>
          <th>광고비</th><th>ROAS</th><th>현재 입찰</th><th>목표 입찰</th><th>변화율</th><th>액션</th>
        </tr></thead>
        <tbody id="tb-actions"></tbody>
      </table>
    </div>
  </div>

  <!-- 수확 패널 -->
  <div class="panel" id="panel-harvest">
    <div class="card">
      <div class="card-header"><h2>Exact 수확 후보</h2><span class="count" id="harvest-count"></span></div>
      <table>
        <thead><tr>
          <th>검색어</th><th>캠페인</th><th>매치타입</th>
          <th>클릭</th><th>주문</th><th>CVR</th><th>광고비</th><th>매출</th><th>ROAS</th>
        </tr></thead>
        <tbody id="tb-harvest"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let allActions = [];
let roasChart, spendChart;

// ── 유틸 ──────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt$ = v => `$${v.toFixed(2)}`;
const fmtN = (v, d=2) => v.toFixed(d);
const colorRoas = v => v >= 5 ? '#2e7d32' : v >= 4 ? '#e65100' : '#c62828';

function roasBar(roas, max=8) {
  const pct = Math.min(roas / max * 100, 100);
  const color = colorRoas(roas);
  return `<div class="roas-bar">
    <div class="roas-track"><div class="roas-fill" style="width:${pct}%;background:${color}"></div></div>
    <span style="color:${color};font-weight:600;min-width:36px">${fmtN(roas)}</span>
  </div>`;
}

function actionBadge(type) {
  const labels = {
    bid_increase:'📈 입찰 인상', bid_decrease:'📉 입찰 인하',
    negative_candidate:'🚫 네거티브', harvest_to_exact:'🌾 Exact 수확',
    maintain:'✅ 유지', insufficient_data:'📊 데이터 부족',
  };
  return `<span class="action-badge ${type}">${labels[type] || type}</span>`;
}

function statusBadge(s) {
  const m = { achieved:'🎯 달성', close:'⚡ 근접', underperforming:'⚠️ 미달' };
  return `<span class="status-badge ${s}">${m[s]||s}</span>`;
}

// ── KPI 카드 ──────────────────────────────────────────────────────
async function loadStatus() {
  const r = await fetch(`${API}/dashboard/status`);
  const d = await r.json();

  const achieved = d.target_achieved_pct;
  const barColor = achieved >= 100 ? '#2ecc71' : achieved >= 80 ? '#f39c12' : '#e74c3c';
  const cardColor = achieved >= 100 ? 'green' : achieved >= 80 ? 'orange' : 'red';

  $('kpi-grid').innerHTML = `
    <div class="kpi-card ${cardColor}">
      <div class="kpi-label">현재 ROAS</div>
      <div class="kpi-value" style="color:${colorRoas(d.overall_roas)}">${fmtN(d.overall_roas)}</div>
      <div class="kpi-sub">목표 ${d.target_roas} · 달성률 ${achieved}%</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(achieved,100)}%;background:${barColor}"></div></div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">총 광고비 / 매출</div>
      <div class="kpi-value">${fmt$(d.total_spend)}</div>
      <div class="kpi-sub">매출 ${fmt$(d.total_sales)} · ACoS ${fmtN(d.overall_acos_pct)}%</div>
    </div>
    <div class="kpi-card orange">
      <div class="kpi-label">조치 필요 키워드</div>
      <div class="kpi-value">${(d.actions_needed.bid_increase||0)+(d.actions_needed.bid_decrease||0)+(d.actions_needed.negative_candidate||0)}</div>
      <div class="kpi-sub">네거티브 ${d.actions_needed.negative_candidate||0} · 입찰인하 ${d.actions_needed.bid_decrease||0} · 입찰인상 ${d.actions_needed.bid_increase||0}</div>
    </div>
    <div class="kpi-card ${d.actions_needed.harvest_to_exact > 0 ? 'blue' : 'green'}">
      <div class="kpi-label">Exact 수확 후보</div>
      <div class="kpi-value">${d.actions_needed.harvest_to_exact||0}</div>
      <div class="kpi-sub">Auto / Broad → Exact 전환 권장</div>
    </div>
  `;

  const src = d.data_source === 'live' ? '🟢 실시간 API' : '🟡 샘플 데이터';
  $('data-badge').textContent = src;
  $('data-badge').className = 'badge' + (d.data_source === 'live' ? '' : ' sample');
}

// ── 캠페인 ────────────────────────────────────────────────────────
async function loadCampaigns() {
  const r = await fetch(`${API}/dashboard/campaigns`);
  const data = await r.json();

  $('camp-count').textContent = `${data.length}개 캠페인`;

  // 테이블
  $('tb-campaigns').innerHTML = data.map(c => `
    <tr>
      <td><strong>${c.campaign_name}</strong></td>
      <td>${fmt$(c.spend)}</td>
      <td>${fmt$(c.sales)}</td>
      <td>${c.orders}</td>
      <td>${roasBar(c.roas)}</td>
      <td>${fmtN(c.acos_pct)}%</td>
      <td>${statusBadge(c.status)}</td>
    </tr>
  `).join('');

  // ROAS 차트
  if (roasChart) roasChart.destroy();
  const ctx1 = document.getElementById('chart-roas').getContext('2d');
  roasChart = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: data.map(c => c.campaign_name.length > 16 ? c.campaign_name.slice(0,14)+'…' : c.campaign_name),
      datasets: [{
        label: 'ROAS',
        data: data.map(c => c.roas),
        backgroundColor: data.map(c => c.roas >= 5 ? '#4caf5088' : c.roas >= 4 ? '#ff980088' : '#f4433688'),
        borderColor:     data.map(c => c.roas >= 5 ? '#4caf50'   : c.roas >= 4 ? '#ff9800'   : '#f44336'),
        borderWidth: 2, borderRadius: 6,
      }],
    },
    options: {
      responsive: true, plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f5f5f5' } },
        x: { grid: { display: false } },
      },
      plugins: {
        annotation: {},
      }
    },
  });

  // Spend vs Sales 차트
  if (spendChart) spendChart.destroy();
  const ctx2 = document.getElementById('chart-spend').getContext('2d');
  spendChart = new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: data.map(c => c.campaign_name.length > 16 ? c.campaign_name.slice(0,14)+'…' : c.campaign_name),
      datasets: [
        { label: '광고비', data: data.map(c => c.spend), backgroundColor: '#ef535088', borderColor: '#ef5350', borderWidth: 2, borderRadius: 4 },
        { label: '매출',   data: data.map(c => c.sales), backgroundColor: '#42a5f588', borderColor: '#42a5f5', borderWidth: 2, borderRadius: 4 },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f5f5f5' } },
        x: { grid: { display: false } },
      },
    },
  });
}

// ── 액션 ─────────────────────────────────────────────────────────
async function loadActions() {
  const r = await fetch(`${API}/dashboard/actions`);
  allActions = await r.json();
  renderActions(allActions);
}

function renderActions(data) {
  $('action-count').textContent = `${data.length}개`;
  $('tb-actions').innerHTML = data.map(a => {
    const changePct = a.bid_change_pct;
    const changeClass = changePct > 0 ? 'num-positive' : changePct < 0 ? 'num-negative' : '';
    const changeStr = changePct !== 0 ? `<span class="${changeClass}">${changePct > 0 ? '+' : ''}${fmtN(changePct)}%</span>` : '—';
    return `<tr>
      <td><strong>${a.search_term}</strong></td>
      <td style="font-size:11px;color:#666">${a.campaign_name}</td>
      <td><code style="font-size:11px;background:#f5f5f5;padding:2px 5px;border-radius:3px">${a.match_type||'AUTO'}</code></td>
      <td>${a.clicks}</td>
      <td>${fmt$(a.spend)}</td>
      <td>${roasBar(a.roas)}</td>
      <td>${fmt$(a.current_bid)}</td>
      <td>${fmt$(a.target_bid)}</td>
      <td>${changeStr}</td>
      <td>${actionBadge(a.action)}</td>
    </tr>`;
  }).join('');
}

function filterActions(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = type === 'all' ? allActions : allActions.filter(a => a.action === type);
  renderActions(filtered);
}

// ── 수확 ─────────────────────────────────────────────────────────
async function loadHarvest() {
  const r = await fetch(`${API}/dashboard/harvest`);
  const data = await r.json();
  $('harvest-count').textContent = `${data.length}개 후보`;
  $('tb-harvest').innerHTML = data.map(kw => `
    <tr>
      <td><strong>${kw.search_term}</strong></td>
      <td style="font-size:11px;color:#666">${kw.campaign_name}</td>
      <td><code style="font-size:11px;background:#e3f2fd;color:#1565c0;padding:2px 6px;border-radius:3px">${kw.match_type||'AUTO'}</code></td>
      <td>${kw.clicks}</td>
      <td>${kw.orders}</td>
      <td>${fmtN(kw.cvr_pct)}%</td>
      <td>${fmt$(kw.spend)}</td>
      <td>${fmt$(kw.sales)}</td>
      <td>${roasBar(kw.roas)}</td>
    </tr>
  `).join('');
}

// ── 탭 전환 ──────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  $(`panel-${name}`).classList.add('active');
}

// ── 초기화 ───────────────────────────────────────────────────────
async function init() {
  try {
    await Promise.all([loadStatus(), loadCampaigns(), loadActions(), loadHarvest()]);
  } catch (e) {
    $('kpi-grid').innerHTML = `
      <div class="error-box" style="grid-column:1/-1">
        <strong>⚠️ 서버에 연결할 수 없습니다</strong><br><br>
        FastAPI 서버를 먼저 실행해주세요:<br><br>
        <code>cd amazon-seller-dashboard</code><br>
        <code>uv run uvicorn main:app --reload --port 8000</code><br><br>
        실행 후 이 페이지를 새로고침하세요.
      </div>`;
  }
}
init();
</script>
</body>
</html>
